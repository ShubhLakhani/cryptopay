<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body, html {
      margin: 0;
      padding: 0;
      background: black;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .content {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      text-align: center;
      z-index: 2;
      font-family: Arial;
    }

    /* Mobile fix */
    @media (max-width: 768px) {
      .content {
        top: 50%;
        font-size: 14px;
      }
    }

    .hide-badge {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 80px;
      background: linear-gradient(transparent, black);
      z-index: 3;
    }

  </style>
</head>

<body>

  <section class="hero">
    <iframe src="https://my.spline.design/prismcoin-e6u2eIvdbRBswUltewY2gFcZ/"></iframe>

    <div class="content">
      <h1>Fast. Efficient.</h1>
      <h2>Revolutionary</h2>
    </div>

    <div class="hide-badge"></div>
  </section>

</body>
</html>
