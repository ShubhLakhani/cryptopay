<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body, html {
      margin: 0;
      padding: 0;
      background: black;
      overflow-x: hidden;
    }
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }
    iframe {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%) scale(1.5);  /* ← CHANGED: added scale */
      transform-origin: center center;          /* ← ADDED */
      width: 100%;
      height: 100%;
      border: none;
      min-width: 600px;
    }
    @media (max-width: 768px) {
      iframe {
        left: 0;
        transform: scale(2.0);                 /* ← CHANGED: scale only on mobile */
        transform-origin: center center;
        min-width: 100%;
      }
    }
    .hide-badge {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 80px;
      background: linear-gradient(transparent, black);
      z-index: 3;
    }
  </style>
</head>
<body>
  <section class="hero">
    <iframe
      src="https://my.spline.design/prismcoin-e6u2eIvdbRBswUltewY2gFcZ/"
      allowfullscreen>
    </iframe>
    <div class="hide-badge"></div>
  </section>
</body>
</html>
